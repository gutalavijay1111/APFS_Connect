# HTTP → HTTPS redirect
server {
    listen 80;
    server_name campaign.thisisvj.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name campaign.thisisvj.com;

    ssl_certificate     /etc/letsencrypt/live/campaign.thisisvj.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/campaign.thisisvj.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # ── Backend API ──────────────────────────────────────────────────────────
    # Matches /apfsconnect/ and /whatsapp (Meta webhook)
    location ~ ^/(apfsconnect|whatsapp) {
        proxy_pass         http://127.0.0.1:9999;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        client_max_body_size 50M;
    }

    # ── Health check (direct, no auth) ───────────────────────────────────────
    location /health {
        proxy_pass http://127.0.0.1:9999;
    }

    # ── React frontend (static build) ────────────────────────────────────────
    location / {
        root  /home/gutal/APFS_Connect/frontend/build;
        index index.html;
        try_files $uri $uri/ /index.html;

        # Cache static assets aggressively
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }
    }
}
